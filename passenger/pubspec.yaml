publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  dio: ^5.9.0
  firebase_auth: ^5.6.0
  firebase_core: ^3.13.0
  cloud_firestore: ^5.6.0
  flutter_dotenv: ^5.2.1
  flutter_map: ^8.2.1
  flutter_riverpod: ^2.6.1
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  latlong2: ^0.9.1
