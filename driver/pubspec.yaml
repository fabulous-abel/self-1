name: selfqueue_driver
description: Driver Flutter app for Self(queue) aligned to 05_CodingGuide.docx.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  dio: ^5.9.0
  firebase_auth: ^5.6.0
  firebase_core: ^3.13.0
  cloud_firestore: ^5.6.0
  audioplayers: ^6.1.1
  flutter_dotenv: ^5.2.1
  flutter_map: ^8.2.1
  flutter_riverpod: ^2.6.1
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  latlong2: ^0.9.1
  socket_io_client: ^3.1.1
  google_sign_in: ^7.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  assets:
    - .env

flutter_launcher_icons:
  android: "launcher_icon"
  ios: false
  web:
    generate: true
    image_path: "assets/icon.png"
    background_color: "#ffffff"
    theme_color: "#2CB2A3"
  image_path: "assets/icon.png"
  min_sdk_android: 21
